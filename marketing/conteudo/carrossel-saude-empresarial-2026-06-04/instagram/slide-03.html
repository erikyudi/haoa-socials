<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#000;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;}
.grain{position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;z-index:3;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(237,233,223,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(237,233,223,.04) 1px,transparent 1px);background-size:80px 80px;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 70% 30%,black,transparent 70%);mask-image:radial-gradient(ellipse 75% 75% at 70% 30%,black,transparent 70%);pointer-events:none;z-index:2;}
.hdr{position:absolute;top:72px;left:86px;right:86px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.logo{width:128px;filter:brightness(0) invert(1);}
.cnt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;letter-spacing:.18em;color:rgba(213,210,210,.42);}
.body{position:absolute;inset:0;padding:86px;padding-top:220px;display:flex;flex-direction:column;justify-content:center;z-index:10;}
.kicker{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:#FFA400;margin-bottom:28px;}
.num{font-family:'Space Grotesk',sans-serif;font-size:280px;font-weight:700;line-height:.85;letter-spacing:-.05em;color:#FFA400;margin-bottom:36px;}
.label{font-family:'Inter',sans-serif;font-size:24px;font-weight:400;line-height:1.5;color:rgba(213,210,210,.78);max-width:640px;}
</style>
</head>
<body>
<div class="slide" style="background:radial-gradient(circle at 28% 72%,rgba(255,164,0,.30),transparent 52%),radial-gradient(circle at 78% 22%,rgba(196,75,201,.22),transparent 48%),radial-gradient(circle at 55% 55%,rgba(236,70,56,.12),transparent 38%),#0A0A0A;">
<div class="grid"></div>
<svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
<svg style="position:absolute;left:-60px;bottom:160px;opacity:.12;z-index:4;" width="440" height="440" viewBox="0 0 440 440">
  <circle cx="220" cy="220" r="70" fill="none" stroke="#FFA400" stroke-width="1"/>
  <circle cx="220" cy="220" r="130" fill="none" stroke="#FFA400" stroke-width="1"/>
  <circle cx="220" cy="220" r="190" fill="none" stroke="#FFA400" stroke-width=".7"/>
  <circle cx="220" cy="220" r="220" fill="none" stroke="#FFA400" stroke-width=".5"/>
</svg>
<div class="hdr"><img class="logo" src="../../../../identidade/logo.svg"><span class="cnt">03/06</span></div>
<div class="body">
  <div class="kicker">↳ DADO DO MERCADO</div>
  <div class="num">68%</div>
  <p class="label">dos profissionais priorizam empresas com plano de saúde na hora de aceitar uma oferta</p>
</div>
</div>
</body>
</html>
