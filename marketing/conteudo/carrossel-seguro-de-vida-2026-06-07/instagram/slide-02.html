<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0A0A0A; }
    .slide {
      width: 1080px;
      height: 1350px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 85%, rgba(255,164,0,.22), transparent 52%),
        radial-gradient(circle at 70% 10%, rgba(224,102,47,.08), transparent 40%),
        #0A0A0A;
    }
    .grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(237,233,223,.04) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(237,233,223,.04) 80px);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .topbar {
      position: absolute;
      top: 72px; left: 86px; right: 86px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo img { width: 130px; display: block; }
    .counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(237,233,223,0.35);
    }
    .content {
      position: absolute;
      top: 50%; left: 86px; right: 86px;
      transform: translateY(-50%);
    }
    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: #FFA400; margin-bottom: 20px;
    }
    .rule {
      width: 72px; height: 4px;
      background: #FFA400;
      box-shadow: 0 0 20px rgba(255,164,0,.45);
      margin-bottom: 30px;
    }
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 78px; font-weight: 700;
      line-height: 0.97; letter-spacing: -0.04em;
      text-transform: uppercase; color: #EDE9DF;
      margin: 0 0 32px 0;
    }
    .body {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 400;
      line-height: 1.6;
      color: rgba(237,233,223,0.65);
      max-width: 700px;
    }
    .body strong {
      color: #EDE9DF;
      font-weight: 600;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(237,233,223,.1);
      margin: 40px 0;
    }
    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(237,233,223,0.5);
      border: 1px solid rgba(237,233,223,.15);
      border-radius: 999px;
      padding: 8px 16px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="grid"></div>
    <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.03;mix-blend-mode:overlay;">
      <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#gr)"/>
    </svg>
    <div class="topbar">
      <div class="logo"><img src="../../../../identidade/logo.svg" alt="HAOA"></div>
      <div class="counter">02 / 06</div>
    </div>
    <div class="content">
      <div class="kicker">↳ 01 · O QUE COBRE</div>
      <div class="rule"></div>
      <h2 class="headline">Mais do que<br>você imagina</h2>
      <p class="body">
        Seguro de vida cobre morte, mas também
        <strong>invalidez por acidente ou doença</strong>,
        doenças graves e perda de renda.
        <br><br>
        Proteção financeira para você e para quem depende de você.
      </p>
      <div class="divider"></div>
      <div class="tags">
        <span class="tag">Morte</span>
        <span class="tag">Invalidez</span>
        <span class="tag">Doenças graves</span>
        <span class="tag">Perda de renda</span>
      </div>
    </div>
  </div>
</body>
</html>
