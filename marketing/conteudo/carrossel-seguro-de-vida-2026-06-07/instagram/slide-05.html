<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0A0A0A; }
    .slide {
      width: 1080px;
      height: 1350px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,164,0,.1), transparent 62%),
        #0A0A0A;
    }
    .grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(237,233,223,.04) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(237,233,223,.04) 80px);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    /* HUD corners */
    .hud-tl, .hud-tr, .hud-bl, .hud-br {
      position: absolute;
      width: 18px; height: 18px;
      pointer-events: none;
    }
    .hud-tl { top: 46px; left: 60px; border-top: 2px solid #FFA400; border-left: 2px solid #FFA400; }
    .hud-tr { top: 46px; right: 60px; border-top: 2px solid #FFA400; border-right: 2px solid #FFA400; }
    .hud-bl { bottom: 46px; left: 60px; border-bottom: 2px solid #FFA400; border-left: 2px solid #FFA400; }
    .hud-br { bottom: 46px; right: 60px; border-bottom: 2px solid #FFA400; border-right: 2px solid #FFA400; }
    .topbar {
      position: absolute;
      top: 72px; left: 86px; right: 86px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo img { width: 130px; display: block; }
    .counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(237,233,223,0.35);
    }
    .content {
      position: absolute;
      top: 50%; left: 86px; right: 86px;
      transform: translateY(-50%);
    }
    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: #FFD166; margin-bottom: 20px;
    }
    .rule {
      width: 72px; height: 4px;
      background: #FFD166;
      box-shadow: 0 0 16px rgba(255,209,102,.35);
      margin-bottom: 30px;
    }
    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 78px; font-weight: 700;
      line-height: 0.97; letter-spacing: -0.04em;
      text-transform: uppercase; color: #EDE9DF;
      margin: 0 0 36px 0;
    }
    .body {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 400;
      line-height: 1.6;
      color: rgba(237,233,223,.6);
      max-width: 680px;
      margin-bottom: 48px;
    }
    .body strong {
      color: #EDE9DF;
      font-weight: 600;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,164,0,.07), rgba(20,20,20,.5));
      border: 1px solid rgba(255,164,0,.2);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .card-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #FFA400;
      box-shadow: 0 0 12px rgba(255,164,0,.5);
      flex-shrink: 0;
    }
    .card-text {
      font-family: 'Inter', sans-serif;
      font-size: 18px; font-weight: 500;
      color: rgba(237,233,223,.7);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="grid"></div>
    <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.03;mix-blend-mode:overlay;">
      <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#gr)"/>
    </svg>
    <div class="hud-tl"></div>
    <div class="hud-tr"></div>
    <div class="hud-bl"></div>
    <div class="hud-br"></div>
    <div class="topbar">
      <div class="logo"><img src="../../../../identidade/logo.svg" alt="HAOA"></div>
      <div class="counter">05 / 06</div>
    </div>
    <div class="content">
      <div class="kicker">↳ 03 · QUANTO CUSTA</div>
      <div class="rule"></div>
      <h2 class="headline">Cabe no seu<br>orçamento</h2>
      <p class="body">
        Menos do que você gasta por mês com streaming.
        O valor depende da <strong>cobertura, idade e necessidades</strong> de cada pessoa.
        <br><br>
        Por isso a HAOA faz uma consultoria antes de indicar qualquer produto.
      </p>
      <div class="card">
        <div class="card-dot"></div>
        <div class="card-text">Consultoria gratuita, sem compromisso, sem pressão de venda.</div>
      </div>
    </div>
  </div>
</body>
</html>
