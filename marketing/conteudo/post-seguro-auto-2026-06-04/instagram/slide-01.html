<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#000;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;}
.grain{position:absolute;inset:0;opacity:.04;mix-blend-mode:overlay;pointer-events:none;z-index:4;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(237,233,223,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(237,233,223,.04) 1px,transparent 1px);background-size:80px 80px;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 80% 12%,black,transparent 70%);mask-image:radial-gradient(ellipse 80% 80% at 80% 12%,black,transparent 70%);pointer-events:none;z-index:2;}

/* "AUTO" watermark tipográfico */
.wm{font-family:'Space Grotesk',sans-serif;font-size:320px;font-weight:700;letter-spacing:-.05em;color:transparent;-webkit-text-stroke:1.5px rgba(255,164,0,.12);position:absolute;bottom:210px;left:30px;line-height:1;user-select:none;pointer-events:none;z-index:3;}

/* Radar decorativo canto inferior direito */
.radar{position:absolute;bottom:-80px;right:-80px;opacity:.16;z-index:3;}

.hdr{position:absolute;top:72px;left:86px;right:86px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.logo{width:128px;filter:brightness(0) invert(1);}
.cnt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;letter-spacing:.18em;color:rgba(213,210,210,.42);}

/* Conteúdo principal — ancorado na metade inferior */
.body{position:absolute;bottom:90px;left:86px;right:86px;z-index:10;}
.kicker{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:#FFA400;margin-bottom:16px;}
.rule{width:72px;height:4px;background:#FFA400;box-shadow:0 0 20px rgba(255,164,0,.55);margin-bottom:36px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:92px;font-weight:700;line-height:.97;letter-spacing:-.04em;color:#D5D2D2;margin-bottom:12px;}
h1 em{font-style:normal;color:#FFA400;}
.sub{font-family:'Inter',sans-serif;font-size:22px;font-weight:400;line-height:1.55;color:rgba(213,210,210,.72);margin-bottom:48px;max-width:820px;}
.pill{display:inline-block;font-family:'Inter',sans-serif;font-size:17px;font-weight:600;background:#FFA400;color:#0A0A0A;padding:16px 44px;border-radius:999px;letter-spacing:.02em;}
.hdl{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.14em;color:rgba(213,210,210,.30);margin-top:28px;}
</style>
</head>
<body>
<div class="slide" style="background:radial-gradient(ellipse 70% 110% at 85% 5%,rgba(255,164,0,.90) 0%,rgba(236,70,56,.70) 18%,rgba(196,75,201,.50) 40%,rgba(31,79,255,.28) 65%,#0A0A0A 88%);">
<div class="grid"></div>
<svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>

<!-- Watermark tipográfico -->
<div class="wm">AUTO</div>

<!-- Radar decorativo -->
<svg class="radar" width="420" height="420" viewBox="0 0 420 420">
  <circle cx="210" cy="210" r="60" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="210" cy="210" r="115" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="210" cy="210" r="170" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="210" cy="210" r="210" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <line x1="0" y1="210" x2="420" y2="210" stroke="rgba(213,210,210,.5)" stroke-width=".4"/>
  <line x1="210" y1="0" x2="210" y2="420" stroke="rgba(213,210,210,.5)" stroke-width=".4"/>
  <circle cx="210" cy="210" r="5" fill="#FFA400"/>
</svg>

<!-- Header -->
<div class="hdr">
  <img class="logo" src="../../../../identidade/logo.svg">
  <span class="cnt">HAOA SEGUROS</span>
</div>

<!-- Conteúdo -->
<div class="body">
  <div class="kicker">↳ SEGURO AUTOMÓVEL</div>
  <div class="rule"></div>
  <h1>Seu carro vale.<br><em>Proteger</em><br>também.</h1>
  <p class="sub">Cotamos nas maiores seguradoras do Brasil e você escolhe a melhor opção — em minutos, sem burocracia.</p>
  <span class="pill">Fazer cotação gratuita</span>
  <p class="hdl">@haoa.seguros</p>
</div>
</div>
</body>
</html>
