<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#000;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;}
.grain{position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;z-index:3;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(237,233,223,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(237,233,223,.04) 1px,transparent 1px);background-size:80px 80px;-webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 45%,black,transparent 70%);mask-image:radial-gradient(ellipse 60% 60% at 50% 45%,black,transparent 70%);pointer-events:none;z-index:2;}
.hdr{position:absolute;top:72px;left:86px;right:86px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.logo-sm{width:128px;filter:brightness(0) invert(1);}
.cnt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;letter-spacing:.18em;color:rgba(213,210,210,.42);}
.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 86px;z-index:10;}
.logo-lg{width:180px;filter:brightness(0) invert(1);margin-bottom:64px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:76px;font-weight:700;line-height:.97;letter-spacing:-.04em;color:#D5D2D2;text-align:center;margin-bottom:24px;}
.sub{font-family:'Inter',sans-serif;font-size:20px;font-weight:400;line-height:1.55;color:rgba(213,210,210,.72);text-align:center;max-width:680px;margin-bottom:48px;}
.pill{font-family:'Inter',sans-serif;font-size:18px;font-weight:600;background:#FFA400;color:#0A0A0A;padding:18px 52px;border-radius:999px;letter-spacing:.02em;}
.hdl{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.14em;color:rgba(213,210,210,.32);margin-top:40px;}
</style>
</head>
<body>
<div class="slide" style="background:radial-gradient(circle at 50% 45%,rgba(255,164,0,.42) 0%,rgba(255,122,0,.20) 38%,#0A0A0A 68%);">
<div class="grid"></div>
<svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
<div class="hdr"><img class="logo-sm" src="../../../../identidade/logo.svg"><span class="cnt">06/06</span></div>
<div class="center">
  <img class="logo-lg" src="../../../../identidade/logo.svg">
  <h1>Cuide de quem você ama</h1>
  <p class="sub">Atendimento consultivo, sem pressão e sem jargão.</p>
  <span class="pill">Pedir cotação gratuita</span>
  <p class="hdl">@haoa.seguros</p>
</div>
</div>
</body>
</html>
