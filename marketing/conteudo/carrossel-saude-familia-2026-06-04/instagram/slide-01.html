<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#000;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;}
.bg-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:grayscale(80%) brightness(.35) contrast(1.1);z-index:1;}
.grain{position:absolute;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;z-index:3;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(237,233,223,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(237,233,223,.04) 1px,transparent 1px);background-size:80px 80px;-webkit-mask-image:radial-gradient(ellipse 70% 70% at 80% 15%,black,transparent 70%);mask-image:radial-gradient(ellipse 70% 70% at 80% 15%,black,transparent 70%);pointer-events:none;z-index:2;}
.hdr{position:absolute;top:72px;left:86px;right:86px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.logo{width:128px;filter:brightness(0) invert(1);}
.cnt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;letter-spacing:.18em;color:rgba(213,210,210,.42);}
.body{position:absolute;bottom:90px;left:86px;right:86px;z-index:10;}
.kicker{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:#FFA400;margin-bottom:16px;}
.rule{width:72px;height:4px;background:#FFA400;box-shadow:0 0 18px rgba(255,164,0,.55);margin-bottom:32px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:96px;font-weight:700;line-height:.97;letter-spacing:-.04em;color:#D5D2D2;margin-bottom:28px;}
.sub{font-family:'Inter',sans-serif;font-size:22px;font-weight:400;line-height:1.52;color:rgba(213,210,210,.70);}
.hdl{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.14em;color:rgba(213,210,210,.32);margin-top:28px;}
</style>
</head>
<body>
<div class="slide" style="background:#0A0A0A;">
<img class="bg-photo" src="https://images.unsplash.com/photo-1609220136736-443140cffec6?w=1080&h=1350&fit=crop&crop=faces,center&q=80" alt="">
<div style="position:absolute;inset:0;background:radial-gradient(ellipse 65% 100% at 82% 10%,rgba(255,164,0,.55) 0%,rgba(236,70,56,.38) 22%,rgba(196,75,201,.28) 48%,rgba(31,79,255,.15) 68%,rgba(10,10,10,.60) 88%);z-index:2;"></div>
<div class="grid"></div>
<svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
<svg style="position:absolute;top:-80px;right:-80px;opacity:.13;z-index:4;" width="360" height="360" viewBox="0 0 360 360">
  <circle cx="180" cy="180" r="50" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="180" cy="180" r="95" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="180" cy="180" r="140" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <circle cx="180" cy="180" r="180" fill="none" stroke="rgba(213,210,210,.8)" stroke-width=".5"/>
  <line x1="0" y1="180" x2="360" y2="180" stroke="rgba(213,210,210,.4)" stroke-width=".4"/>
  <line x1="180" y1="0" x2="180" y2="360" stroke="rgba(213,210,210,.4)" stroke-width=".4"/>
  <circle cx="180" cy="180" r="5" fill="#FFA400"/>
</svg>
<div class="hdr"><img class="logo" src="../../../../identidade/logo.svg"><span class="cnt">01/06</span></div>
<div class="body">
  <div class="kicker">↳ PLANO DE SAÚDE INDIVIDUAL</div>
  <div class="rule"></div>
  <h1>Saúde da sua família não pode esperar</h1>
  <p class="sub">Escolha um plano que caiba no orçamento e cubra o que importa</p>
  <p class="hdl">@haoa.seguros</p>
</div>
</div>
</body>
</html>
